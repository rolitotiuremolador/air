version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile.backend  # Added the ./ prefix
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
  
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.frontend # Added the ./ prefix
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app